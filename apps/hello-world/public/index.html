<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hello from Anton's Playground</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #111827, #1f2937 45%, #0f172a);
        color: #e5e7eb;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .card {
        padding: 2.5rem 3rem;
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 1.25rem;
        background: rgba(17,24,39,0.7);
        box-shadow: 0 20px 60px rgba(0,0,0,0.35);
        text-align: center;
      }
      h1 { margin: 0 0 0.5rem; font-size: clamp(2rem, 6vw, 4rem); }
      p { margin: 0; opacity: 0.8; }
      code {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.35rem 0.6rem;
        border-radius: 0.5rem;
        background: rgba(255,255,255,0.08);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Hello, world.</h1>
      <p>Welcome to Anton&apos;s Playground.</p>
      <code>apps/hello-world</code>
    </main>
  </body>
</html>
