version: 1
name: starter-web-app
slug: starter-web-app
owner: anton
stack: static-html
visibility: private

domain:
  publicHost: starter-web-app.carbon.jonathansalzer.com
  publicBaseDomain: carbon.jonathansalzer.com
  privateTailnetHost: anton.tail73de9.ts.net

runtime:
  service: starter-web-app
  internalPort: 8080
  healthcheckPath: /
  docker:
    composeFile: compose.yml
    dockerfile: Dockerfile
    network: carbon_apps

routing:
  privatePathPrefix: /starter-web-app
  stripPrefix: true
  tls: true

privacy:
  mode: tailscale-only
  note: Private app served via the VPS Tailscale hostname using a path prefix.

build:
  install: ""
  build: ""
  run: "docker compose up -d --build"

metadata:
  description: Starter static app for the prototype-builder platform.
  tags:
    - starter
    - prototype
