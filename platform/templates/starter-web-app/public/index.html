<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>starter-web-app</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(160deg, #111827, #1f2937 45%, #0f172a);
        color: #f9fafb;
      }
      main {
        width: min(680px, calc(100vw - 32px));
        padding: 32px;
        border-radius: 20px;
        background: rgba(17, 24, 39, 0.8);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin-top: 0;
        font-size: clamp(2rem, 5vw, 3rem);
      }
      p {
        line-height: 1.6;
        color: #d1d5db;
      }
      code {
        color: #93c5fd;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>starter-web-app</h1>
      <p>This is the default prototype-builder starter app.</p>
      <p>Edit <code>public/index.html</code>, update <code>carbon.yml</code>, then deploy with the platform scripts.</p>
    </main>
  </body>
</html>
